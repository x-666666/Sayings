<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Sayings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="nav-tabs">
            <button id="mode-read-btn" class="active-tab">Read</button>
            <button id="mode-test-btn">Test Yourself</button>
        </div>

        <div id="read-section" class="content-section">
            <p id="quote" style="white-space: pre;">"Loading inspiration..."</p>
            <!-- 添加了 style="white-space: pre;" 
             可以解决换行符问题
             -->
            <p id="author"></p>
            <button id="new-quote-btn" class="action-btn">Next Saying</button>
        </div>

        <div id="test-section" class="content-section hidden">
            <div class="test-header">
                <h3>Complete the saying:</h3>
                <span id="score-display" class="score-badge">Score: 0 / 0</span>
            </div>
            
            <p id="test-quote" style="white-space: pre;">"Loading question..."</p>
            
            <div id="options-container">
                </div>
            
            <p id="test-feedback"></p>
            <button id="next-question-btn" class="action-btn hidden">Next Question</button>
        </div>
    </div>
    <!-- 鼠标指针 
         css中已将原鼠标隐藏
     -->
    <div class="mouse"></div>
    <script src="script.js"></script>
    
    <script src="clickE.js"></script>
    <script src="mouseCursor.js"></script>
</body>
</html>
